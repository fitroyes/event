[[event]]
path = "202606-marge-centre-vendredi"
name = "De la marge au centre (vendredi)"
place = { name = "Ateliers Ginkgo", addr = "9 rue Jeanne d’arc, 10000 Troyes" }
date = 2026-06-19T18:00:00+02:00
notes = [
  "🌍 De quoi s’agit-il? N’y a t’il pas des expériences, des témoignages, des pensées qui vous mettent en mouvement? Qui vous font changer votre regard sur le monde?",
  "C'est bien de ça qu’il s’agit!",
  "«De la marge au centre» en référence bien sûr au livre de l’autrice et militante afro américaine Bell Hooks mais aussi à la célèbre phrase du cinéaste Jean Luc Godard «C’est la marge qui tient la page». Remettons au centre de notre attention, des histoires, des pensées, des singularités invisibilisées, marginalisées par les discours dominant.",
  "🗓️ Pour cela on vous a prévu tout une programmation: Atelier, projections, disscussions, temps calme, temps festif et en musique avec des concerts, des orchestres, une chorale et bien d’autres surprises! On vous dévoile le programme détaillé dans les jours qui arrivent!",
  "❤️ Un événement pensé et organisé par un trio de choc @_danceflore_ @mona_leu_leu et @cosmegb à la DA c’est la Queen @nom_d_utilisateur_3000 qui nous régale de ses superbes idées et créations! Et les amies d'@amedutemple @hamid_mandgar @collectifparade @aux_adelphes qui nous accompagnent dans cette folle aventure!",
  "---",
  "🗓️ Au programme:",
  "VEN. 19/06 [18h-22h]",
  "🥁🎺🎸19h-22h: Jam session, en partenariat avec le @amedutemple!",
  "---",
  "📍Où: 9 rue Jeanne d'arc à Troyes, au niveau des ateliers Ginkgo juste derrière le centre d'art contemporain Passages. Entrée libre.",
]

