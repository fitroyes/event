[[event]]
path = "20260609-aesh"
name = "Ecole inclusive: toutes et tous mobilisé·es!"
place = { name = "Devant le collège Langevin de Ste Savine", addr = "14 Av. Gabriel Thierry, 10300 Sainte-Savine" }
date = 2026-06-09T17:00:00+02:00
notes = [
  "À la suite du premier groupe de travail sur l’avenir des AESH, une large intersyndicale appelle tous les personnels de l’Éducation nationale à se mobiliser le 9 juin. L’objectif: obtenir la création d’un corps de fonctionnaire pour l’ensemble des AESH, seule condition pour une sortie de la précarité. Pour les associer directement à la définition de leur métier, la FSU-SNUipp lance une consultation nationale.",
  "https://10.snuipp.fr/article/ecole-inclusive-toutes-et-tous-mobilise-es",
]

