name: GitHub Page

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  do:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Deno
        uses: denoland/setup-deno@v2
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generation
        run: deno run --allow-env --allow-write=public --allow-read main.ts

      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./public"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
